# 此工作流将对节点依赖项进行全新安装，缓存/恢复这些依赖项，构建源代码，并在不同版本的节点上运行测试
# 更多信息请参阅：https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

触发:
推送:
分支: [ "main" ]
拉取请求:
分支: [ "main" ]

作业:
构建:

运行于: ubuntu-latest

策略:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
